name: Build

# 14 轮起走 PyPI 分发,这个 workflow 只做 lint(保留文件名是为了不动 README badge
# 指向)。实际发版由 .github/workflows/release.yml 在 tag 推送时触发。
on:
  push:
    branches: [master, refactor/**]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Ruff check
        run: uvx ruff check .
